[options]
; Configuración de la base de datos
db_host = db  ; Si estás usando Docker, la base de datos debe ser el servicio llamado "db" (o lo que hayas configurado en docker-compose)
db_port = 5432
db_user = odoo  ; El usuario que configuraste para PostgreSQL
db_password = change_me  ; La contraseña que configuraste para PostgreSQL
db_name = False  ; Odoo generalmente no necesita un nombre de base de datos aquí, ya que puede usar la que se especifique en el momento de la conexión

; Configuración de la red y el acceso
proxy_mode = True
log_level = info
log_file = /var/log/odoo/odoo.log

; Otros valores por defecto
addons_path = /opt/odoo/addons,/opt/odoo/custom-addons
admin_passwd = change_me  ; Cambia esto por tu contraseña de administrador

; Configuración para Argentina
country_code = AR
init = l10n_ar_auto_config

; Redefinir el puerto en caso de necesitarlo
http_port = 8069
