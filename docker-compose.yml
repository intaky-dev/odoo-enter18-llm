version: '3.7'
services:
  db:
    image: postgres:15
    container_name: odoo-db
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=SuperSecret123!
      - POSTGRES_DB=odoo
      - POSTGRES_INITDB_ARGS="--locale=es_AR.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    restart: always

  odoo:
    build: .
    container_name: odoo-enterprise
    restart: always
    depends_on:
      - db
    environment:
      - HOST=db
      - PGHOST=db
      - PGPORT=5432
      - PGUSER=${POSTGRES_USER}
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - PGDATABASE=${POSTGRES_DB}
      - ADMIN_PASSWORD=${ODOO_ADMIN_PASSWORD}
    ports:
      - "8069:8069"
      - "8071:8071"
    volumes:
      - odoo-data:/var/lib/odoo
      - ./config:/etc/odoo

volumes:
  odoo-db:
  odoo-data:
