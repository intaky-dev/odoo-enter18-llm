version: '3.7'
services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db

    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_INITDB_ARGS=--locale=es_AR.UTF-8
    ports:
      - "5432:5432"
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    restart: always


  odoo:
    image: klap50/odoo18-enterprise:latest
    container_name: odoo-enterprise
    logging:
     driver: "json-file"
     options:
       max-size: "10m"
       max-file: "3"
    restart: always
    depends_on:
      - db
    environment:
      - HOST=db
      - PGHOST=db
      - PGPORT=5432
      - PGUSER=${POSTGRES_USER}
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - PGDATABASE=${POSTGRES_DB}
      - ADMIN_PASSWORD=${ODOO_ADMIN_PASSWORD}
    ports:
      - "8069:8069"
      - "8071:8071"
    volumes:
      - odoo-data:/var/lib/odoo
      - ./config:/etc/odoo

volumes:
  odoo-db-data:
  odoo-data:
