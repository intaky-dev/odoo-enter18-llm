name: Docker Publish

on:
  schedule:
    - cron: '44 8 * * *'  # Ejecución programada
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKERHUB: docker.io
  IMAGE_NAME: klap50/odoo18-enterprise  # Nombre en Docker Hub
  GHCR_IMAGE_NAME: ${{ github.repository }}  # Nombre en GHCR

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # Necesario para firmar la imagen

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Descargar el archivo .deb desde GitHub Releases
      - name: Descargar Odoo .deb con autenticación
        run: |
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -L -o odoo_18.0+e.latest_all.deb \
               "https://github.com/FW-CORP/odoo-enter18/releases/download/v18.0-enterprise/odoo_18.0+e.latest_all.deb"

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔐 Login en GitHub Container Registry (GHCR)
      - name: Log into GitHub Container Registry (GHCR)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🔐 Login en Docker Hub
      - name: Log into Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: klap50
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Instalar cosign
      - name: Install Cosign
        run: |
          curl -Lo cosign https://github.com/sigstore/cosign/releases/download/v2.2.4/cosign-linux-amd64
          chmod +x cosign
          sudo mv cosign /usr/local/bin/

      # Extraer metadatos para etiquetas
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.GHCR_IMAGE_NAME }}
            ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}

      # 🚀 Build y Push de la imagen
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 🔏 Firmar la imagen (GHCR)
      - name: Sign the published Docker image (GHCR)
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
